<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ransom Title Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0f0d;
      --panel: #1a1a18;
      --line: #393934;
      --text: #ece9e0;
      --muted: #8d8a82;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px;
      font-family: "Newsreader", Georgia, serif;
      background: var(--bg);
      color: var(--text);
    }
    h1 {
      margin: 0 0 20px;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-size: 28px;
    }
    .title-block {
      border: 1px solid var(--line);
      background: var(--panel);
      margin-bottom: 26px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 17px;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
    }
    .final-wrap {
      border: 1px solid var(--line);
      background: #11110f;
      padding: 18px;
      margin-bottom: 14px;
    }
    .final {
      width: min(100%, 1100px);
      display: block;
      margin: 0 auto;
    }
    .final-wrap p {
      margin: 10px 0 0;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }
    .option {
      margin: 0;
      border: 1px solid var(--line);
      background: #10100f;
      padding: 10px;
    }
    .option img {
      width: 100%;
      display: block;
    }
    figcaption {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      word-break: break-all;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #f1efe8;
    }
  </style>
</head>
<body>
  <h1>Ransom Title Generator Preview</h1>
